# SDPRS Nginx Configuration
# Reverse proxy for FastAPI backend and HLS streaming
#
# 安裝: sudo cp nginx.conf /etc/nginx/sites-available/sdprs
# 啟用: sudo ln -s /etc/nginx/sites-available/sdprs /etc/nginx/sites-enabled/
# 測試: sudo nginx -t
# 重載: sudo systemctl reload nginx
#
# 功能:
# 1. 反向代理 FastAPI 到 port 80
# 2. HLS 串流代理 (反向隧道端口)
# 3. 靜態檔案服務 (MP4 影片)
# 4. WebSocket 支援

# ===== 串流端口映射 =====
# 多節點串流端口映射 (根據 node_id 分配端口)
map $1 $tunnel_port {
    glass_node_01  18554;
    glass_node_02  18555;
    glass_node_03  18556;
    default        18554;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name sdprs.local localhost;
    
    # 日誌
    access_log /var/log/nginx/sdprs-access.log;
    error_log /var/log/nginx/sdprs-error.log;
    
    # 客戶端上傳限制 (用於影片上傳)
    client_max_body_size 100M;
    
    # ===== 靜態檔案 (MP4 影片) =====
    location /storage/ {
        alias /var/www/storage/;
        autoindex off;
        
        # MP4 快取
        expires 1d;
        add_header Cache-Control "public, immutable";
        
        # CORS for video playback
        add_header Access-Control-Allow-Origin *;
    }
    
    # ===== HLS 串流代理 =====
    # 動態串流端口，根據 node_id 映射
    # glass_node_01 -> 18554, glass_node_02 -> 18555, ...
    location ~ ^/stream/([^/]+)/(.*)$ {
        # 從 node_id 計算端口
        # glass_node_01 -> 01 -> 18554
        set $node_num $1;
        
        # 簡化映射：直接使用環境變數或硬編碼
        # 生產環境應使用 map 或 upstream
        
        # 代理到本地隧道端口 (透過 map 動態映射)
        proxy_pass http://127.0.0.1:$tunnel_port/$2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # HLS 特殊處理
        proxy_cache off;
        proxy_buffering off;
        
        # CORS
        add_header Access-Control-Allow-Origin *;
    }
    
    # ===== WebSocket 支援 =====
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # WebSocket 逾時設定
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # ===== FastAPI 後端 =====
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 上傳逾時
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
    
    # ===== API 端點 =====
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CORS for API calls
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key";
        
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
    
    # ===== 靜態資源 =====
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}