# SDPRS Docker Compose Configuration
# Multi-container deployment for central server
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Services:
#   - sdprs-app: FastAPI backend (port 8000)
#   - mosquitto: MQTT broker (port 1883)
#   - nginx: Reverse proxy (port 80)

version: "3.8"

services:
  # ===== FastAPI Application =====
  sdprs-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sdprs-app
    restart: unless-stopped
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../storage:/app/storage
    depends_on:
      - mosquitto
    networks:
      - sdprs-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===== MQTT Broker =====
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sdprs-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - sdprs-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: sdprs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../storage:/var/www/storage:ro
    depends_on:
      - sdprs-app
    networks:
      - sdprs-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===== Networks =====
networks:
  sdprs-network:
    driver: bridge

# ===== Volumes =====
volumes:
  mosquitto-data:
  mosquitto-log: