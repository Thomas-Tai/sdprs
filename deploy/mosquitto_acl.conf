# ============================================================
# SDPRS Mosquitto ACL — 最小權限存取控制清單
# SDPRS Mosquitto Access Control List (least privilege)
# ============================================================
#
# 用途 / PURPOSE:
#   此檔案由 mosquitto.conf 中的 `acl_file` 指令引用，
#   僅在「安全模式 (SECURE MODE)」下生效
#   （即 allow_anonymous false 且已載入 password_file）。
#   在目前的匿名模式下，本檔案會被忽略。
#
#   Referenced by the `acl_file` directive in mosquitto.conf. It is ONLY
#   enforced in SECURE MODE (allow_anonymous false + a password_file loaded).
#   In the current anonymous MVP mode this file is ignored.
#
# 安裝 / INSTALL:
#   sudo cp mosquitto_acl.conf /etc/mosquitto/acl.conf
#   （並確認 mosquitto.conf 內 `acl_file /etc/mosquitto/acl.conf` 已取消註解）
#
# ------------------------------------------------------------
# ⚠ 主題路徑必須先與實際主題方案對齊！
# ⚠ RECONCILE TOPIC PATHS BEFORE ENABLING.
#   The blocks below follow the observed scheme  sdprs/edge/{node_id}/{category}
#   (from shared/mqtt_topics.py: heartbeat, pump_status, stream_status, cmd/*),
#   but node ids and any extra subtopics MUST be verified against your real
#   edge_glass/config.yaml, edge_pump/config.py and the server's mqtt_service
#   BEFORE turning ACLs on. An overly-tight ACL SILENTLY DROPS messages — the
#   publisher gets no error, the message just never arrives. Test after enabling.
#
#   ACL semantics reminder:  write = publish,  read = subscribe/receive.
# ============================================================


# ------------------------------------------------------------
# 中央伺服器 / Central server — full access to the edge namespace.
# Subscribes to all telemetry (heartbeat/pump_status/stream_status) and
# publishes all commands (cmd/*), so it needs read+write on the whole tree.
# ------------------------------------------------------------
user sdprs_server
topic readwrite sdprs/edge/#


# ------------------------------------------------------------
# 玻璃邊緣節點 / Glass edge node (TEMPLATE — copy per node)
#   Publishes:  heartbeat, stream_status   (telemetry only)
#   Subscribes: cmd/#                       (stream_start/stop, update, snooze…)
# Least privilege: it may NOT publish to cmd/* (only the server issues commands)
# nor read any other node's topics.
# ------------------------------------------------------------
user sdprs_glass_node_01
topic write sdprs/edge/glass_node_01/heartbeat
topic write sdprs/edge/glass_node_01/stream_status
topic read  sdprs/edge/glass_node_01/cmd/#


# ------------------------------------------------------------
# 水泵邊緣節點 (ESP32) / Pump edge node (TEMPLATE — copy per node)
#   Publishes:  pump_status, heartbeat      (telemetry only)
#   Subscribes: cmd/#                        (pump commands)
# ------------------------------------------------------------
user sdprs_pump_node_01
topic write sdprs/edge/pump_node_01/pump_status
topic write sdprs/edge/pump_node_01/heartbeat
topic read  sdprs/edge/pump_node_01/cmd/#


# ------------------------------------------------------------
# 新增節點 / Adding more nodes:
#   Add one `user …` block per additional device. The username here MUST match
#   both the `mosquitto_passwd` entry you created AND the MQTT_USERNAME
#   configured on that device. If you introduce new published subtopics,
#   grant them explicitly (or broaden to `topic write sdprs/edge/<node>/#` and
#   accept that the node could then also publish to its own cmd/* topics).
# ------------------------------------------------------------
