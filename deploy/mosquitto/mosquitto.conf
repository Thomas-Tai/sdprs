# ── SDPRS Mosquitto config — Zeabur cloud deployment ──
# Auth mode: password_file (populated at container start by /entrypoint.sh from
# MQTT_USERNAME/MQTT_PASSWORD env vars). Anonymous access is DISABLED — this
# broker is exposed to the public internet via Zeabur TCP proxy on 1883.

listener 1883 0.0.0.0
protocol mqtt

# ── Auth ──
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ──
# Retained messages, LWT, subscription state. Zeabur containers are ephemeral
# by default; enable a Volume mount on /mosquitto/data if durability matters.
persistence true
persistence_location /mosquitto/data/

# ── Logging ──
# stdout so Zeabur's log viewer captures everything.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Limits / hardening ──
max_connections -1
max_queued_messages 1000
max_keepalive 65535
message_size_limit 1048576
allow_duplicate_messages false
