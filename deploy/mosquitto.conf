# SDPRS Mosquitto MQTT Broker Configuration
# Minimal configuration for local network
#
# 安裝: sudo cp mosquitto.conf /etc/mosquitto/mosquitto.conf
# 重啟: sudo systemctl restart mosquitto
# 狀態: sudo systemctl status mosquitto
# 日誌: journalctl -u mosquitto -f
#
# 安全說明:
# - 此配置僅供內部網路使用
# - 未啟用認證，請勿暴露到公網
# - 若需認證，請參考 mosquitto_password 指令

# ===== 基本設定 =====
pid_file /var/run/mosquitto/mosquitto.pid

# 持久化
persistence true
persistence_location /var/lib/mosquitto/

# 日誌
log_dest file /var/log/mosquitto/mosquitto.log
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ===== 網路設定 =====
# 監聽本地所有介面
listener 1883

# 允許匿名連線（僅內部網路）
allow_anonymous true

# ===== 效能調整 =====
# 最大連線數
max_connections -1

# 最大佇列長度（防止慢客戶端佔用記憶體）
max_queued_messages 1000

# Keepalive 設定
max_keepalive 65535

# ===== 安全設定 =====
# 不允許遞迴訊息
allow_duplicate_messages false

# 訊息大小限制
message_size_limit 0

# ===== 協議設定 =====
# 支援 MQTT 3.1, 3.1.1, 5.0
protocol mqtt

# ===== WebSocket 支援 (可選) =====
# 若需要 WebSocket，取消以下註解
# listener 9001
# protocol websockets

# ===== ACL 設定 (可選) =====
# acl_file /etc/mosquitto/acl.conf