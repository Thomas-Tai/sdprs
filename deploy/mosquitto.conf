# SDPRS Mosquitto MQTT Broker Configuration
# Minimal configuration for local network
#
# 安裝: sudo cp mosquitto.conf /etc/mosquitto/mosquitto.conf
# 重啟: sudo systemctl restart mosquitto
# 狀態: sudo systemctl status mosquitto
# 日誌: journalctl -u mosquitto -f
#
# 安全說明 / SECURITY:
# 本檔案支援兩種模式，詳見 deploy/MQTT_SECURITY.md：
# This file supports TWO modes — see deploy/MQTT_SECURITY.md for full setup:
#   1) 匿名模式 (ANONYMOUS) — 目前啟用，僅供內部網路單節點 MVP。
#      Anonymous, LAN-only. Any device on the LAN can publish/subscribe to
#      ANY topic (spoof telemetry, send pump commands). NEVER expose to WAN.
#   2) 安全模式 (SECURE) — 生產環境強烈建議：帳密認證 + 每節點 ACL。
#      Authentication + per-node ACL. Enable before any multi-node / untrusted
#      network deployment. Switch steps are in the 網路設定 section below.

# ===== 基本設定 =====
pid_file /var/run/mosquitto/mosquitto.pid

# 持久化
persistence true
persistence_location /var/lib/mosquitto/

# 日誌
log_dest file /var/log/mosquitto/mosquitto.log
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ===== 網路設定 =====
# 監聽本地所有介面
listener 1883

# ============================================================
# 安全模式 (SECURE MODE) — 生產環境強烈建議啟用
# To enable authentication + ACL (recommended for production):
#   1. Create a password file (does NOT commit any secret):
#        sudo mosquitto_passwd -c /etc/mosquitto/passwd sdprs_server
#        sudo mosquitto_passwd    /etc/mosquitto/passwd sdprs_glass_node_01
#        sudo mosquitto_passwd    /etc/mosquitto/passwd sdprs_pump_node_01
#      (You will be prompted for each password interactively — nothing is
#       written to any file tracked by git.)
#   2. Comment out `allow_anonymous true` below and uncomment the secure block.
#   3. Install the ACL file: sudo cp mosquitto_acl.conf /etc/mosquitto/acl.conf
#   4. sudo systemctl restart mosquitto
#   5. Set MQTT_USERNAME / MQTT_PASSWORD on the server (.env) and each device.
#   Full walkthrough: deploy/MQTT_SECURITY.md
# ------------------------------------------------------------
# password_file /etc/mosquitto/passwd
# acl_file /etc/mosquitto/acl.conf
# allow_anonymous false
# ============================================================

# ⚠ CURRENT MODE: anonymous LAN-only (MVP single node). 內部網路專用，
# 未啟用認證。切勿暴露到公網 / DO NOT expose this broker to the WAN.
allow_anonymous true

# ===== 效能調整 =====
# 最大連線數
max_connections -1

# 最大佇列長度（防止慢客戶端佔用記憶體）
max_queued_messages 1000

# Keepalive 設定
max_keepalive 65535

# ===== 安全設定 =====
# 不允許遞迴訊息
allow_duplicate_messages false

# 訊息大小限制
message_size_limit 0

# ===== 協議設定 =====
# 支援 MQTT 3.1, 3.1.1, 5.0
protocol mqtt

# ===== WebSocket 支援 (可選) =====
# 若需要 WebSocket，取消以下註解
# listener 9001
# protocol websockets

# ===== ACL 設定 =====
# 最小權限 ACL 範本見 deploy/mosquitto_acl.conf（每節點限定自身主題）。
# A least-privilege ACL template ships alongside this file:
#   deploy/mosquitto_acl.conf
# It is ONLY enforced in SECURE MODE — i.e. after you uncomment `acl_file`
# in the 網路設定 section above (and `allow_anonymous false`). In the current
# anonymous mode the ACL file is ignored. Install it with:
#   sudo cp mosquitto_acl.conf /etc/mosquitto/acl.conf
# then set `acl_file /etc/mosquitto/acl.conf` (already listed in the secure
# block above). Reconcile node ids / topics with edge_glass/config.yaml first.