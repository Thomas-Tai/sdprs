<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - SDPRS 防災監控系統</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-800 to-gray-900">
    <div class="max-w-md w-full mx-4">
        <!-- 登入卡片 -->
        <div class="bg-white rounded-lg shadow-2xl p-8">
            <!-- 標題 -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">SDPRS 防災監控系統</h1>
                <p class="text-gray-600 mt-2">智能防災監測與自動響應系統</p>
            </div>
            
            <!-- 錯誤訊息 -->
            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
                {{ error }}
            </div>
            {% endif %}
            
            <!-- 登入表單 -->
            <form action="/login" method="POST" class="space-y-6">
                <!-- 帳號 -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                        帳號
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        autofocus
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="請輸入帳號"
                    >
                </div>
                
                <!-- 密碼 -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        密碼
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="請輸入密碼"
                    >
                </div>
                
                <!-- 登入按鈕 -->
                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                >
                    登入
                </button>
            </form>
            
            <!-- 底部 -->
            <div class="text-center mt-8 text-gray-500 text-sm">
                © 2026 SDPRS 防災監控系統
            </div>
        </div>
    </div>
</body>
</html>
