<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
<meta charset="UTF-8">
<title>SDPRS · 智能防災監測與自動響應系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  All assets are served locally from /static/spa — the dashboard must render
  with zero external requests so it stays usable during a disaster when the
  site's internet uplink may be down. Fonts fall back to the OS stack
  (Microsoft JhengHei / Consolas) declared in the Tailwind config below.
-->
<!--
  Pre-Tailwind theme reset. `class="dark"` above keeps the no-JS path dark;
  if the operator's persisted theme is light, flip the class BEFORE Tailwind
  loads so we don't flash dark. Runtime tweak system (see tweaks-panel.jsx)
  doesn't use localStorage today (postMessage-only), so this is defensive
  scaffolding — safe to leave in place for future localStorage-backed themes.
  TODO(dashboard-audit-2026-07-15): once tweak values live in localStorage,
  read the same key here to make this actually protective.
-->
<script>
  (function() {
    try {
      var t = localStorage.getItem('theme');
      if (t === 'light') {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
      }
    } catch (e) { /* localStorage blocked — keep dark default */ }
  })();
</script>
<style>
  /* Toast entrance — replaces the non-existent Tailwind `animate-in` utility. */
  @keyframes sdprs-toast-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: sdprs-toast-in 0.2s ease-out both; }
</style>
<script src="/static/spa/vendor/tailwind.min.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'Noto Sans TC', 'system-ui', '"Microsoft JhengHei"', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'Consolas', 'monospace'],
        },
        colors: {
          'sev-critical': { DEFAULT: '#DC2626', fg: '#FFFFFF', dim: '#7f1d1d' },
          'sev-warn':     { DEFAULT: '#F59E0B', fg: '#1F2937', dim: '#78350f' },
          'sev-info':     { DEFAULT: '#3B82F6', fg: '#FFFFFF', dim: '#1e3a8a' },
          'sev-ok':       { DEFAULT: '#10B981', fg: '#FFFFFF', dim: '#064e3b' },
          'sev-stale':    { DEFAULT: '#94A3B8', fg: '#0F172A', dim: '#334155' },
          surface: {
            base: '#020617',
            panel: '#0B1220',
            elevated: '#111A2E',
            overlay: '#1E293B',
          },
          border: {
            subtle: '#1E293B',
            strong: '#334155',
          },
          ink: {
            primary: '#F8FAFC',
            secondary: '#CBD5E1',
            muted: '#64748B',
            dim: '#94A3B8',
          },
        },
        keyframes: {
          'pulse-critical': {
            '0%, 100%': { boxShadow: 'inset 4px 0 0 0 #DC2626, 0 0 0 0 rgba(220,38,38,0.6)' },
            '50%': { boxShadow: 'inset 4px 0 0 0 #DC2626, 0 0 0 8px rgba(220,38,38,0)' },
          },
          'live-blink': {
            '0%, 100%': { opacity: 1 },
            '50%': { opacity: 0.4 },
          },
          'spin-slow': { to: { transform: 'rotate(360deg)' } },
        },
        animation: {
          'pulse-critical': 'pulse-critical 2s ease-in-out 0s 1',
          'live-blink': 'live-blink 2s ease-in-out infinite',
          'spin-slow': 'spin-slow 1.5s linear infinite',
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="/static/spa/styles.css">
<!-- Logged-in user, injected server-side by the dashboard route.
     Wrapped in try/catch because a bare identifier (unsubstituted placeholder)
     is a ReferenceError that would kill the entire <head> script parse. -->
<script>
  try {
    window.SDPRS_USER = __SDPRS_USER__;
  } catch (e) {
    console.error('[SDPRS] SDPRS_USER placeholder not substituted by server');
    window.SDPRS_USER = null;
  }
</script>
<script src="/static/spa/vendor/react.production.min.js"></script>
<script src="/static/spa/vendor/react-dom.production.min.js"></script>
<script src="/static/spa/vendor/babel.min.js"></script>
</head>
