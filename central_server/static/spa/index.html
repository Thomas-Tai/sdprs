<!DOCTYPE html>

<title>SDPRS · 智能防災監測與自動響應系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  All assets are served locally from /static/spa — the dashboard must render
  with zero external requests so it stays usable during a disaster when the
  site's internet uplink may be down. Fonts fall back to the OS stack
  (Microsoft JhengHei / Consolas) declared in the Tailwind config below.
-->
<!--
  Pre-Tailwind theme reset. `class="dark"` above keeps the no-JS path dark;
  if the operator's persisted theme is light, flip the class BEFORE Tailwind
  loads so we don't flash dark.

  SHL-6: this used to read localStorage['theme'], a key NOTHING in the app ever
  writes — so every light-theme operator got a full dark flash on every reload.
  The real source of truth is the tweak system's atomic JSON blob under
  `sdprs.tweaks` (see __TWEAKS_LS_KEY / __writeTweaks in tweaks-panel.jsx),
  whose `theme` field is 'dark' | 'light' and which app.jsx's DEFAULTS seed.
  Read that. Kept deliberately defensive: this runs before React, before
  Tailwind, and before any error handling exists, so a corrupt blob or a
  blocked localStorage must silently fall through to the dark default.
-->
<script>
  (function() {
    try {
      var raw = localStorage.getItem('sdprs.tweaks');
      if (!raw) return;
      var t = JSON.parse(raw);
      if (t && t.theme === 'light') {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
      }
    } catch (e) { /* localStorage blocked or blob corrupt — keep dark default */ }
  })();
</script>
<style>
  /* Toast entrance — replaces the non-existent Tailwind `animate-in` utility. */
  @keyframes sdprs-toast-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: sdprs-toast-in 0.2s ease-out both; }

  /* SHL-7: boot spinner keyframes. The #root fallback below animates
     `spin-slow`, but that name only ever existed inside tailwind.config's
     `theme.extend.keyframes` — which emits CSS only when some element uses the
     matching `animate-spin-slow` utility class, and nothing does. The spinner
     therefore sat perfectly still and a slow first load looked like a hung tab.
     Declared here as plain CSS so it spins before Tailwind has even loaded. */
  @keyframes spin-slow { to { transform: rotate(360deg); } }
</style>
<script src="/static/spa/vendor/tailwind.min.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {

          'sev-info':     { DEFAULT: '#3B82F6', fg: '#FFFFFF', dim: '#1e3a8a' },
          'sev-ok':       { DEFAULT: '#10B981', fg: '#FFFFFF', dim: '#064e3b' },
          'sev-stale':    { DEFAULT: '#94A3B8', fg: '#0F172A', dim: '#334155' },
          surface: {
            base: '#020617',
            panel: '#0B1220',
            elevated: '#111A2E',
            overlay: '#1E293B',
          },
          border: {
            subtle: '#1E293B',
            strong: '#334155',
          },
          ink: {
            primary: '#F8FAFC',
            secondary: '#CBD5E1',
            muted: '#64748B',
            dim: '#94A3B8',
          },
        },
        keyframes: {
          'pulse-critical': {
            '0%, 100%': { boxShadow: 'inset 4px 0 0 0 #DC2626, 0 0 0 0 rgba(220,38,38,0.6)' },
            '50%': { boxShadow: 'inset 4px 0 0 0 #DC2626, 0 0 0 8px rgba(220,38,38,0)' },
          },
          'live-blink': {
            '0%, 100%': { opacity: 1 },
            '50%': { opacity: 0.4 },
          },
          'spin-slow': { to: { transform: 'rotate(360deg)' } },
        },
        animation: {
          'pulse-critical': 'pulse-critical 2s ease-in-out 0s 1',
          'live-blink': 'live-blink 2s ease-in-out infinite',
          'spin-slow': 'spin-slow 1.5s linear infinite',
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="/static/spa/styles.css">
<!-- Logged-in user, injected server-side by the dashboard route
     (main.py:508, via _js_safe_json which JSON-encodes and escapes
     < > & U+2028 U+2029).

     SHL-19: the assignment used to sit inside a try/catch in a script block
     shared with the fallback. try/catch only ever covered ONE of the two ways
     this can fail:
       • placeholder not substituted → bare identifier → ReferenceError, a
         RUNTIME error, which the catch does handle; and
       • substituted value with broken escaping → SyntaxError, a PARSE-time
         error, which kills the whole <script> block *including the catch that
         was supposed to handle it*. The fallback never ran, window.SDPRS_USER
         stayed undefined, and data.jsx's `window.SDPRS_USER || ''` quietly
         produced an operator with no name on every audit-attributed action.
     So the injection now gets a script block to itself: a parse error there
     takes down only that block, and the separate normalizer below — which
     contains no injected text and therefore cannot fail to parse — is
     guaranteed to run and establish the null fallback either way. -->
<script>
  window.SDPRS_USER = __SDPRS_USER__;
</script>
<script>
  if (typeof window.SDPRS_USER === 'undefined') {
    console.error('[SDPRS] SDPRS_USER placeholder not substituted or failed to parse');
    window.SDPRS_USER = null;
  }
</script>
